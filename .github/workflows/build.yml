name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev
      
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci
      
      - name: Build Linux binaries
        run: |
          # Build backend server
          cd backend
          GOOS=linux GOARCH=amd64 go build -ldflags='-s -w' -o ../build/server/dota-gsi-server-linux ./cmd/server
          cd ..
          
          # Build frontend
          cd frontend
          npm run build
          cd ..
          
          # Build Wails GUI
          wails build -platform linux/amd64 -tags desktop,production -s -o dota-gsi-gui-linux
      
      - name: Package Linux build
        run: |
          mkdir -p dist/runinhas-linux
          cp build/bin/dota-gsi-gui-linux dist/runinhas-linux/runinhas
          cp build/server/dota-gsi-server-linux dist/runinhas-linux/dota-gsi-server
          mkdir dist/runinhas-linux/voice-cache
          cp config.json dist/runinhas-linux/
          cp README.md dist/runinhas-linux/
          tar -czf runinhas-linux-amd64.tar.gz -C dist runinhas-linux
      
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: runinhas-linux-amd64
          path: runinhas-linux-amd64.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci
      
      - name: Build Windows binaries
        shell: bash
        run: |
          # Build backend server
          cd backend
          GOOS=windows GOARCH=amd64 go build -ldflags='-s -w' -o ../build/server/dota-gsi-server.exe ./cmd/server
          cd ..
          
          # Build frontend
          cd frontend
          npm run build
          cd ..
          
          # Build Wails GUI
          wails build -platform windows/amd64 -tags desktop,production -s -windowsconsole -o dota-gsi-gui.exe
      
      - name: Package Windows build
        shell: bash
        run: |
          mkdir -p dist/runinhas-windows
          cp build/bin/dota-gsi-gui.exe dist/runinhas-windows/runinhas.exe
          cp build/server/dota-gsi-server.exe dist/runinhas-windows/
          mkdir dist/runinhas-windows/voice-cache
          cp config.json dist/runinhas-windows/
          cp README.md dist/runinhas-windows/
      
      - name: Create Windows ZIP
        run: Compress-Archive -Path dist/runinhas-windows -DestinationPath runinhas-windows-amd64.zip
      
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: runinhas-windows-amd64
          path: runinhas-windows-amd64.zip

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: runinhas-linux-amd64
      
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: runinhas-windows-amd64
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            runinhas-linux-amd64.tar.gz
            runinhas-windows-amd64.zip
          draft: false
          prerelease: false
          generate_release_notes: true
