run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters:
  enable:
    - errcheck      # Check for unchecked errors
    - gosimple      # Simplify code
    - govet         # Vet examines Go source code
    - ineffassign   # Detect ineffectual assignments
    - staticcheck   # Static analysis
    - unused        # Check for unused code
    - gosec         # Security issues
    - gofmt         # Format check
    - goimports     # Import check
    - misspell      # Spell check
    - revive        # Linting
    - gocritic      # Comprehensive linting
    - unconvert     # Unnecessary conversions
    - prealloc      # Preallocate slices
    - bodyclose     # Check HTTP body close
    - nilerr        # Check nil errors
    - noctx         # Check context usage
    - rowserrcheck  # Check SQL rows.Err
    - sqlclosecheck # Check SQL Close

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true
    
  govet:
    enable-all: true
    
  gosec:
    severity: medium
    confidence: medium
    
  revive:
    rules:
      - name: exported
        severity: warning
        disabled: false
        
  gocritic:
    enabled-tags:
      - diagnostic
      - performance
      - style
      
issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
  
  exclude-rules:
    # Exclude some linters from running on tests
    - path: _test\.go
      linters:
        - gosec
        - errcheck
